implementation_notes:
  normalization: "Each scored metric emits 0..1; multiply by pillar_weight; sum; map to 1..10; apply score_caps on gate failures."
  missing_data: "Redistribute weights within the same pillar or lower confidence in UI."
  peer_fallback_order: "peer_median_if_n>=5 -> sector_median -> company_5y_median"

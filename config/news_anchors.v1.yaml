# StockMoat — news anchor universe (sector radar, not full screener)
schema: stockmoat/news_anchors/1

# Caps applied after Gemini scoring (rolling 24h UTC window in pipeline).
publish:
  impact_threshold: 8
  global_max_per_24h: 15
  per_lane_max_per_24h: 4

# Lane tickers are ingested for FMP news/press + SEC 8-K only.
# profile_ids: links to sector_profiles.v1.yaml for UI badges (optional).
lanes:

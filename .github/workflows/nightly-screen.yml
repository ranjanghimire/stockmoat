# Nightly batch: scores a universe via FMP, upserts `screen_scores`, then precomputes
# FMP OHLC into `screen_charts` for the Screener “Chart” popup.
#
# Secrets (repo → Settings → Secrets and variables → Actions):
#   FMP_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Optional env overrides in each job below: SCREEN_MAX_TICKERS, SCREEN_TICKER_GAP_MS, SCREEN_OFFSET
# Apply migrations so `screen_charts` exists: `npx supabase db push` (see supabase/migrations/).
#
# GitHub `schedule` events are not guaranteed to an exact minute; typical minimum cadence
# for frequent crons is ~5 minutes. This workflow runs once per day (UTC).
#
# The screener and chart precompute run as **separate jobs** (`screen` then `charts`) so each
# gets its own `timeout-minutes` budget. A single job running both steps could exhaust the
# limit during scoring and terminate before most `screen_charts` rows exist (Charts tab uses
# an inner join to `screen_charts`, so the visible count matches completed chart upserts).

name: Nightly screen

on:
  schedule:
    # 07:15 UTC daily — tweak as needed (cron uses UTC).
    - cron: '15 7 * * *'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCREEN_TICKER_GAP_MS: '30000'
      SCREEN_MAX_TICKERS: '1000'
      SCREEN_OFFSET: '0'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run nightly screener
        run: npm run screen:nightly

  charts:
    needs: screen
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Same throttle as scoring unless you set SCREEN_CHART_GAP_MS in repo env.
      SCREEN_TICKER_GAP_MS: '30000'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Precompute screener charts
        run: npm run screen:charts

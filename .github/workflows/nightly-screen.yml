# Nightly moat scores → `screen_scores` only.
#
# Charts and earnings run in separate workflows (no job chaining) so a long or
# timed-out screen run cannot block them:
#   nightly-charts.yml   — screen_charts for Charts / Screener
#   nightly-earnings.yml — ticker_next_earnings for Home
#
# Secrets: FMP_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

name: Nightly screen

on:
  # Scheduled runs disabled — on-demand only via workflow_dispatch until production.
  # schedule:
  #   - cron: '15 7 * * *'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NIGHTLY_BUDGET: '200'
      SCREEN_TICKER_GAP_MS: '12000'
      SCREEN_FETCH_PEERS: 'false'
      SCREEN_MAX_TICKERS: '1000'
      SCREEN_OFFSET: '0'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run screen:nightly

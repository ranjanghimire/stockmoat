# Nightly batch: scores a universe via FMP, upserts `screen_scores`, precomputes
# FMP OHLC into `screen_charts`, then fills `ticker_next_earnings` for the Home page.
#
# Secrets (repo → Settings → Secrets and variables → Actions):
#   FMP_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# Optional env overrides: SCREEN_MAX_TICKERS, SCREEN_TICKER_GAP_MS, SCREEN_OFFSET
# Apply migrations: `npx supabase db push` (see supabase/migrations/).
#
# Jobs are split so each step gets its own `timeout-minutes` budget.

name: Nightly screen

on:
  schedule:
    - cron: '15 7 * * *'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCREEN_TICKER_GAP_MS: '30000'
      SCREEN_MAX_TICKERS: '1000'
      SCREEN_OFFSET: '0'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run nightly screener
        run: npm run screen:nightly

  charts:
    needs: screen
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCREEN_TICKER_GAP_MS: '30000'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Precompute screener charts
        run: npm run screen:charts

  earnings:
    needs: charts
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCREEN_EARNINGS_GAP_MS: '3000'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Upsert next earnings dates
        run: npm run screen:earnings
